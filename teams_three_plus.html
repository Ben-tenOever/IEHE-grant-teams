<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>IEHE Teams of three or more</title>
  <link rel="stylesheet" href="teams.css" />
</head>
<body>
<div class="container" style="max-width:1100px; margin:0 auto; padding:18px 16px;">
  <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:baseline;">
    <a href="index.html" style="text-decoration:none;">Home</a>
    <a href="faculty.html" style="text-decoration:none;">Faculty profiles</a>
    <a href="teams_two.html" style="text-decoration:none;">Pairs</a>
    <a href="teams_three_plus.html" style="text-decoration:none;">Teams of three or more</a>
    <a href="resources.html" style="text-decoration:none;">Resources and model systems</a>
    <a href="approaches.html" style="text-decoration:none;">Experimental approaches</a>
  </div>
</div>
<main id="app"></main>
<script>
(function () {
  var app = document.getElementById("app");
  app.innerHTML = '<div class="container" style="max-width:1100px; margin:0 auto; padding:24px 16px;">Loading teams...</div>';

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];
    });
  }

  Promise.all([
    fetch("data/faculty_index.json?cb=" + Date.now(), { cache: "no-store" }).then(r => r.json()),
    fetch("data/teams.json?cb=" + Date.now(), { cache: "no-store" }).then(r => r.json())
  ]).then(function(res) {
    var faculty = res[0] || [];
    var teams = res[1] || [];
    var idByName = {};
    for (var i = 0; i < faculty.length; i++) {
      idByName[String(faculty[i].name || "").toLowerCase()] = faculty[i].id;
    }

    function memberLink(name, id) {
      var safe = esc(name);
      var fid = id || idByName[String(name || "").toLowerCase()] || "";
      return fid ? '<a href="profile.html?id=' + encodeURIComponent(fid) + '" style="text-decoration:none;">' + safe + "</a>" : safe;
    }

    teams = teams.filter(function(t) {
      return String(t.team_type || "").toLowerCase() === "team";
    });

    var html = '<div class="container" style="max-width:1100px; margin:0 auto; padding:24px 16px;">';
    html += '<h1 style="margin:0;">Teams of three or more</h1>';
    html += '<div style="opacity:.85; margin-top:6px;">IEHE</div>';
    html += '<div style="margin-top:16px; display:flex; flex-direction:column; gap:12px;">';

    for (var k = 0; k < teams.length; k++) {
      var t = teams[k] || {};
      var members = Array.isArray(t.members) ? t.members : [];
      var ids = Array.isArray(t.member_ids) ? t.member_ids : [];
      var mhtml = members.map(function(m, idx) { return memberLink(m, ids[idx]); }).join(", ");

      html += '<div class="card" style="padding:16px;">';
      html +=   '<div style="font-weight:700; font-size:1.05rem;">' + esc(t.team_name || "") + "</div>";
      html +=   '<div style="opacity:.85; margin-top:6px;">' + mhtml + "</div>";
      if (t.opportunity_title) html += '<div style="margin-top:10px; opacity:.9;">Opportunity: ' + esc(t.opportunity_title) + "</div>";
      if (t.rationale) html += '<div style="margin-top:10px; opacity:.9;">' + esc(t.rationale) + "</div>";
      if (t.suggested_specific_aim) html += '<div style="margin-top:10px;"><span style="opacity:.8;">Suggested aim: </span>' + esc(t.suggested_specific_aim) + "</div>";
      if (t.next_steps) html += '<div style="margin-top:10px;"><span style="opacity:.8;">Next steps: </span>' + esc(t.next_steps) + "</div>";
      html += '</div>';
    }

    html += "</div></div>";
    app.innerHTML = html;
  }).catch(function(err) {
    console.error(err);
    app.innerHTML = '<pre style="white-space:pre-wrap; padding:16px;">' + esc(String(err)) + "</pre>";
  });
})();
</script>
</body>
</html>
