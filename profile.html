<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Faculty profile</title>
  <style>
    :root { --bg:#f5f5f7; --text:#222; --muted:#666; --card:#fff; --border:#e6e6ea; --nyu:#410093; --nyu2:#5f2ca1; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }
    header { background:linear-gradient(90deg,var(--nyu),var(--nyu2)); color:#fff; padding:22px 24px; }
    header h1 { margin:0 0 6px 0; font-size:22px; font-weight:700; }
    header p { margin:0; opacity:.92; }
    .tabs { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
    .tab { display:inline-block; color:#fff; text-decoration:none; opacity:.96; padding:8px 12px; border:1px solid rgba(255,255,255,.30); border-radius:999px; }
    .tab:hover { opacity:1; border-color:rgba(255,255,255,.55); }
    .subnav { margin-top:10px; display:flex; gap:12px; flex-wrap:wrap; }
    .subnav a { color:#fff; opacity:.9; text-decoration:none; }
    .subnav a:hover { opacity:1; text-decoration:underline; }
    main { max-width:980px; margin:0 auto; padding:18px 16px 44px 16px; }
    .panel { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px; box-shadow:0 6px 18px rgba(0,0,0,.06); }
    .badges { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .badge { font-size:12px; padding:4px 10px; border-radius:999px; border:1px solid var(--border); background:#fafafa; }
    .small { color:var(--muted); font-size:13px; line-height:1.35; }
    hr { border:none; border-top:1px solid var(--border); margin:14px 0; }
    ul { margin:8px 0 0 18px; padding:0; }
    li { margin:6px 0; }
  </style>
</head>
<body>
  <header>
    <h1>Faculty profile</h1>
    <p>IEHE</p>
    <div class="tabs">
      <a class="tab" href="teams_two.html">Paired teams</a>
      <a class="tab" href="teams_programs.html">Team collaborations</a>
      <a class="tab" href="opportunities.html">Active opportunities</a>
    </div>
    <div class="subnav">
      <a href="index.html">Back to directory</a>
    </div>
  </header>

  <main>
    <div class="panel" id="p">Loading</div>
    <div class="small" style="margin-top:10px">Tip: copy the URL to share a specific faculty profile</div>
  </main>

  <script src="data/faculty_data.js"></script>
  <script>
    function qs(name){
      const u = new URL(window.location.href);
      return u.searchParams.get(name);
    }

    function ul(items){
      if(!items || !items.length) return '<div class="small">None listed</div>';
      return '<ul>' + items.map(x => `<li>${x}</li>`).join('') + '</ul>';
    }

    const d = window.__FACULTY_DATA__;
    const id = qs('id');
    const f = d.faculty.find(x => x.faculty_id === id);

    if(!f){
      document.getElementById('p').textContent = 'Profile not found';
    } else {
      const badges = (f.affiliations||[]).map(a => `<span class="badge">${a}</span>`).join('');

      const pubs = (f.publications_raw || []).map(p => {
        if(!p || typeof p !== 'object') return '';
        const title = (p.title || '').trim();
        const year = p.year ? ` (${p.year})` : '';
        const journal = (p.journal || '').trim();
        const line = [title + year, journal].filter(Boolean).join(' — ');
        return `<li>${line}</li>`;
      }).filter(Boolean);

      document.getElementById('p').innerHTML = `
        <div style="font-size:20px; font-weight:700">${f.name || ''}</div>
        <div class="small" style="margin-top:6px">${(f.title || '').trim()}</div>
        ${f.leadership_role ? `<div class="small" style="margin-top:6px">${f.leadership_role}</div>` : ''}
        <div class="badges">${badges}</div>

        <hr/>
        <div style="font-weight:700">Lab synopsis</div>
        <div style="margin-top:6px; line-height:1.55">${(f.lab_synopsis || '').replaceAll('\n','<br/>') || '<span class="small">None listed</span>'}</div>

        <hr/>
        <div style="font-weight:700">Common platforms and experiments</div>
        <div style="margin-top:6px; line-height:1.55">${(f.common_experiments_raw || '').replaceAll('\n','<br/>') || '<span class="small">None listed</span>'}</div>

        <hr/>
        <div style="font-weight:700">Topic tags</div>
        ${ul(f.research_keywords)}

        <hr/>
        <div style="font-weight:700">Methods and implementation tags</div>
        ${ul(f.complementary_areas)}

        <hr/>
        <div style="font-weight:700">Publications ingested</div>
        ${pubs.length ? '<ul>' + pubs.join('') + '</ul>' : '<div class="small">None listed</div>'}
      `;
    }
  </script>
</body>
</html>
