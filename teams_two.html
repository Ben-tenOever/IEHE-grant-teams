<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Paired teams</title>
  <link rel="stylesheet" href="assets/teams.css"/>
  <style>
    :root { --nyu:#410093; --nyu2:#5f2ca1; }
    header { background:linear-gradient(90deg,var(--nyu),var(--nyu2)); color:#fff; padding:22px 24px; font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    header h1 { margin:0 0 6px 0; font-size:22px; font-weight:700; }
    header p { margin:0; opacity:.92; }
    .tabs { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
    .tab { display:inline-block; color:#fff; text-decoration:none; opacity:.96; padding:8px 12px; border:1px solid rgba(255,255,255,.30); border-radius:999px; }
    .tab:hover { opacity:1; border-color:rgba(255,255,255,.55); }
  </style>
</head>
<body>
  <header>
    <h1>Paired teams</h1>
    <p>Suggested two person collaborations for active opportunities</p>
    <div class="tabs">
      <a class="tab" href="teams_programs.html">Team collaborations</a>
      <a class="tab" href="opportunities.html">Active opportunities</a>
      <a class="tab" href="index.html">Faculty</a>
    </div>
  </header>

  <div class="wrap">
    <div class="toolbar">
      <input id="search" placeholder="Search" />
      <div class="count" id="count"></div>
    </div>

    <div id="cards" data-json="data/teams_small.json"></div>
  </div>

  <script src="assets/render_teams.js"></script>
</body>
</html>
